# Netlify config for the Vite + React build

[build]
  command = "npm run build"
  publish = "dist"

# Firebase web config lives in the client bundle by design;
# disable Netlify's secret scanner so the build doesn't fail on it.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA fallback — all routes resolve to the single index.html entry
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
