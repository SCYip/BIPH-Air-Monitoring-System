name: Archive weekday data

# Runs daily; the script itself only acts on *complete weekdays* inside the
# WINDOW_START..WINDOW_END range and skips anything already archived. So the
# first run back-fills all existing weekday data, and later runs are no-ops
# until a new weekday finishes. After WINDOW_END it does nothing.

on:
  schedule:
    # 18:00 UTC = 02:00 next day in UTC+8 — yesterday is a finished day by then.
    - cron: '0 18 * * *'
  workflow_dispatch: {}

# Allow the job to commit the new archive/ files back to the repo.
permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Archive weekday readings
        env:
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          WINDOW_START: '2026-04-01'
          WINDOW_END: '2026-06-11'
          TZ_OFFSET_HOURS: '8'
        run: node scripts/archive-weekdays.mjs

      - name: Commit new archive files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --staged --quiet; then
            echo "No new archive files."
          else
            git commit -m "Archive weekday data ($(date -u +%Y-%m-%d))"
            git push
          fi
