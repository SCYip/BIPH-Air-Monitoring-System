name: Cleanup old readings

# Deletes raw readings older than RETENTION_DAYS from Devices/<id>/Readings so
# the Realtime Database stays small. Never touches the Archive node.
#
# Behaviour:
#   • Scheduled run + FIREBASE_DB_SECRET is set  -> real delete
#   • Scheduled run + secret NOT set             -> dry-run with a warning
#     (so the workflow doesn't fail until you add the secret)
#   • Manual run                                  -> honours the dry_run input

on:
  schedule:
    # Sundays 19:30 UTC — weekly is plenty for a 14-day retention window.
    - cron: '30 19 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (true = preview only, false = actually delete)'
        type: boolean
        default: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Delete old readings
        env:
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          RETENTION_DAYS: '14'
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual run — use whatever the user picked in the dispatch form.
            export DRY_RUN="$MANUAL_DRY_RUN"
          elif [ -z "$FIREBASE_DB_SECRET" ]; then
            # Scheduled run with no secret set — degrade to a dry run so the
            # workflow doesn't fail. Once FIREBASE_DB_SECRET is added in repo
            # Settings → Secrets, this branch is skipped and real cleanup runs.
            echo "::warning::FIREBASE_DB_SECRET not configured — running in dry-run only. Add the secret in repo Settings → Secrets and variables → Actions to enable real cleanup."
            export DRY_RUN=true
          else
            export DRY_RUN=false
          fi
          node scripts/cleanup-old-readings.mjs
